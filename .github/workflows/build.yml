name: Build DDrawCompat

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Add MSBuild to PATH
      uses: microsoft/setup-msbuild@v2

    - name: Install WDK
      run: |
        $wdkUrl = "https://go.microsoft.com/fwlink/?linkid=2272234"
        $wdkInstaller = "$env:TEMP\wdksetup.exe"
        Invoke-WebRequest -Uri $wdkUrl -OutFile $wdkInstaller
        Start-Process -FilePath $wdkInstaller -ArgumentList "/quiet /norestart" -Wait

    - name: Build Release
      working-directory: DDrawCompat
      run: |
        msbuild DDrawCompat.vcxproj `
          /p:Configuration=Release `
          /p:Platform=Win32

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: ddraw
        path: Release/ddraw.dll